<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Results</title>

    <link
        rel="stylesheet"
        href="css/global.css">

    <link
        rel="stylesheet"
        href="css/result.css">

</head>

<body>

<div class="desktop-wrapper">

    <div class="mobile-frame">

        <main class="result-page">

            <!-- ========================= -->
            <!-- Title -->
            <!-- ========================= -->

            <img
                class="result-title"
                src="assets/buttons/result-title-text.png"
                alt="Results">

            <!-- ========================= -->
            <!-- Card -->
            <!-- ========================= -->

            <section class="card-section">

                <div
                    class="card-container">

                    <div
                        id="cardInner"
                        class="card-inner">

                        <!-- Front -->

                        <div
                            class="card-face card-front">

                            <img

                                src="assets/cards/card-back.jpeg"

                                alt="Card Back">

                        </div>

                        <!-- Back -->

                        <div
                            class="card-face card-back">

                            <img

                                id="characterImage"

                                src=""

                                alt="Character">

                        </div>

                    </div>

                </div>

            </section>

            <!-- ========================= -->
            <!-- Reveal Text -->
            <!-- ========================= -->

            <img

                id="clickText"

                class="click-text"

                src="assets/buttons/click-to-reveal-text.png"

                alt="Reveal">

            <!-- ========================= -->
            <!-- Character Result -->
            <!-- ========================= -->

<section id="resultInfo" class="result-info">

    <h2 id="resultSentence"></h2>

</section>

            <!-- ========================= -->
            <!-- Claim Button -->
            <!-- ========================= -->

            <button

                id="claimBtn"

                class="claim-btn">

                <img

                    src="assets/buttons/claim-btn.png"

                    alt="Claim">

            </button>

            <!-- ========================= -->
            <!-- Collection Popup -->
            <!-- ========================= -->

            <div

                id="claimPopup"

                class="claim-popup">

                <h2>

                    Character Added

                </h2>

                <p>

                    Added To Your Collection

                </p>

            </div>
                        <!-- ========================= -->
            <!-- End Main -->
            <!-- ========================= -->

        </main>

    </div>

</div>

<!-- ========================= -->
<!-- Scripts -->
<!-- ========================= -->

<script src="data/outcomes.js"></script>

<script src="data/characters.js"></script>

<script src="js/storage.js"></script>

<script src="js/collection.js"></script>

<script src="js/result.js"></script>

</body>

</html>
