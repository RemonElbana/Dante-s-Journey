<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Accessories</title>

    <link
        rel="stylesheet"
        href="css/global.css">

    <link
        rel="stylesheet"
        href="css/accessories.css">

</head>

<body>

<div class="desktop-wrapper">

<div class="mobile-frame">

<main class="discover-page">

    <!-- ===================== -->
    <!-- TITLE -->
    <!-- ===================== -->

    <h1 class="discover-title">

        Discover

    </h1>


    <!-- ===================== -->
    <!-- ACCESSORY PREVIEW -->
    <!-- ===================== -->

    <div class="preview-container">

        <img

            id="leftPreview"

            class="preview preview-left"

            src="">

        <div class="frame-container">

            <img

                class="frame"

                src="assets/backgrounds/discover-accessory-bg.jpeg"

                alt="Frame">

            <img

                id="currentAccessory"

                class="current-accessory"

                src="">

        </div>

        <img

            id="rightPreview"

            class="preview preview-right"

            src="">

    </div>


    <!-- ===================== -->
    <!-- INFO -->
    <!-- ===================== -->

    <div class="accessory-info">

        <h1

            id="accessoryName">

        </h1>

        <h2

            id="accessoryOwner">

        </h2>

    </div>


    <!-- ===================== -->
    <!-- NAVIGATION -->
    <!-- ===================== -->

    <div class="navigation">

        <button

            id="previousBtn"

            class="arrow-btn">

            <img

                src="assets/buttons/left-btn.png"

                alt="Previous">

        </button>

        <button

            id="nextBtn"

            class="arrow-btn">

            <img

                src="assets/buttons/right-btn.png"

                alt="Next">

        </button>

    </div>
        <!-- ===================== -->
    <!-- BUTTONS -->
    <!-- ===================== -->

    <div class="bottom-buttons">

        <img

            id="homeBtn"

            class="bottom-btn"

            src="assets/buttons/home-btn.png"

            alt="Home">

        <img

            id="charactersBtn"

            class="bottom-btn"

            src="assets/buttons/characters-btn.png"

            alt="Characters">

    </div>

</main>

</div>

</div>

<script src="data/accessories.js"></script>

<script src="js/accessories.js"></script>

</body>

</html>
