<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Discover</title>

    <link
        rel="stylesheet"
        href="css/global.css">

    <link
        rel="stylesheet"
        href="css/discover.css">

</head>

<body>

<div class="desktop-wrapper">

    <div class="mobile-frame">

        <main class="discover-page">

            <!-- Cards Area -->

            <section class="cards-area">

                <img

                    id="leftPreview"

                    class="side-card left-card"

                    src=""

                    alt="Previous Character"

                >

                <div class="card-container">

                    <div

                        id="cardInner"

                        class="card-inner"

                    >

                        <div class="card-front">

                            <img

                                id="frontImage"

                                src=""

                                alt="Character"

                            >

                        </div>

                        <div class="card-back">

                            <img

                                id="backImage"

                                src=""

                                alt="Character Back"

                            >

                        </div>

                    </div>

                </div>

                <img

                    id="rightPreview"

                    class="side-card right-card"

                    src=""

                    alt="Next Character"

                >

            </section>

            <!-- Character Information -->

            <section class="character-info">

                <h1

                    id="characterName"

                >

                </h1>

                <h2

                    id="characterTitle"

                >

                </h2>

                <p

                    id="characterDescription"

                >

                </p>

            </section>

            <!-- Navigation -->

            <section class="navigation">

                <img

                    id="prevBtn"

                    class="nav-btn"

                    src="assets/buttons/left-btn.png"

                    alt="Previous"

                >

                <img

                    id="nextBtn"

                    class="nav-btn"

                    src="assets/buttons/right-btn.png"

                    alt="Next"

                >

            </section>

            <!-- Bottom Buttons -->

            <section class="bottom-buttons">

                <img

                    id="homeBtn"

                    class="bottom-btn"

                    src="assets/buttons/home-btn.png"

                    alt="Home"

                >

                <img

                    id="accessoriesBtn"

                    class="bottom-btn"

                    src="assets/buttons/accessories-btn.png"

                    alt="Accessories"

                >

            </section>

        </main>

    </div>

</div>

<script src="data/characters.js"></script>

<script src="js/discover.js"></script>

</body>

</html>
