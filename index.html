<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dante's Journey</title>

    <link rel="stylesheet"
          href="css/global.css">

    <link rel="stylesheet"
          href="css/home.css">

</head>

<body>

    <div class="desktop-wrapper">

        <div class="mobile-frame">

            <main class="home-page">

                <button
                    id="startBtn"
                    class="image-btn start-btn">

                    <img
                        src="assets/buttons/start-btn.png"
                        alt="Start">

                </button>

                <button
                    id="discoverBtn"
                    class="image-btn discover-btn">

                    <img
                        src="assets/buttons/discover-btn.png"
                        alt="Discover">

                </button>

                <button
                    id="creditsBtn"
                    class="image-btn credits-btn">

                    <img
                        src="assets/buttons/credits-btn.png"
                        alt="Credits">

                </button>

            </main>

        </div>

    </div>

    <script src="js/home.js"></script>

</body>

</html>
